<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A@M </title>
    <link rel="icon" type="image/png" href="asset/2.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Welcome/Landing Page -->
    <div class="welcome-container">
        <div class="welcome-content">
            <!-- Decorative flowers -->
            <div class="flower-decoration flower-top-left">🌹</div>
            <div class="flower-decoration flower-top-right">🌸</div>
            <div class="flower-decoration flower-bottom-left">🌺</div>
            <div class="flower-decoration flower-bottom-right">🌷</div>

            <!-- Logo and Brand Name -->
            <div class="welcome-logo">
                <img src="asset/2.png" alt="العلامة التجارية" style="width: 200px; height: 200px; object-fit: contain; border-radius: 50%;">
            </div>

            <h1 class="brand-title">  A@M </h1>
            <p class="brand-subtitle" style="font-size: 1.5rem; margin-top: -10px; margin-bottom: 20px; color: #FF1493;">Crochet & Makrame</p>
            <p class="brand-description">
               ستايل مختلف وديكور أدفأ… تفاصيل مصنوعة يدويًا خصيصًا لك
            </p>

            <!-- Shopping Button -->
            <a href="main.html" class="shopping-button">
                <i class="fas fa-shopping-bag"></i>
                <span>GO SHOPPING</span>
            </a>
        </div>

        <!-- Background pattern -->
        <div class="background-pattern"></div>
    </div>
</body>
</html>
